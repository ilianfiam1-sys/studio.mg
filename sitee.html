<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>studio.mg | Expérience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --black: #000000;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* --- Splash --- */
        #splash {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 10vw, 5rem);
            animation: fadeOut 0.6s ease 1.2s forwards;
        }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- Logo --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 40px; z-index: 1500;
        }
        .logo { 
            font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; 
            color: var(--white); /* Blanc pour être visible sur les images */
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* --- Container Horizontal --- */
        .slider {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .slider::-webkit-scrollbar { display: none; }

        /* --- Slides --- */
        .slide {
            flex: 0 0 100vw;
            height: 100vh;
            scroll-snap-align: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-img {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: transform 1.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(1.15);
            z-index: 1;
        }
        .slide.active .bg-img { transform: scale(1); }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 2;
        }

        /* --- Contenu --- */
        .info {
            position: relative;
            z-index: 10;
            color: var(--white);
            text-align: center;
            max-width: 800px;
            padding: 20px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .slide.active .info {
            opacity: 1;
            transform: translateY(0);
        }

        .info h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 10vw, 6rem);
            margin-bottom: 15px;
            letter-spacing: -2px;
        }

        .btn-reserve {
            display: inline-block;
            padding: 20px 50px;
            background: var(--white);
            color: var(--black);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-reserve:hover { transform: scale(1.05); background: #f0f0f0; }

        /* --- PAGINATION (Boutons Blancs Visibles) --- */
        .pagination {
            position: fixed; 
            bottom: 50px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex; 
            gap: 25px; 
            z-index: 1500;
            padding: 10px 20px;
        }

        .dot {
            width: 12px; 
            height: 12px; 
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3); /* Blanc semi-transparent par défaut */
            border: 2px solid var(--white);
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.2); /* Ombre pour détacher du fond */
        }

        .dot.active { 
            background: var(--white); /* Blanc pur quand actif */
            transform: scale(1.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6); /* Effet de lueur */
        }

    </style>
</head>
<body>

    <div id="splash">studio.mg</div>

    <header>
        <div class="logo">studio.mg</div>
    </header>

    <div class="slider" id="slider">
        <section class="slide" id="s1">
            <div class="bg-img" style="background-image: url('https://images.unsplash.com/photo-1520523839897-bd0b52f945a0?q=80&w=2000');"></div>
            <div class="overlay"></div>
            <div class="info">
                <h2>Piano</h2>
                <p>Cours particuliers & Masterclass</p>
                <a href="mailto:contact@studio.mg?subject=Piano" class="btn-reserve">Réserver</a>
            </div>
        </section>

        <section class="slide" id="s2">
            <div class="bg-img" style="background-image: url('https://www.likeitlivemusic.com/files/2018/04/DJ-Markus-with-Sax.jpg');"></div>
            <div class="overlay"></div>
            <div class="info">
                <h2>DJ & Sax</h2>
                <p>Performance Live Événementielle</p>
                <a href="mailto:contact@studio.mg?subject=DJSax" class="btn-reserve">Réserver</a>
            </div>
        </section>

        <section class="slide" id="s3">
            <div class="bg-img" style="background-image: url('https://i.pinimg.com/originals/d0/0d/25/d00d25b92cf5b2186d7b743e6c5b689e.jpg');"></div>
            <div class="overlay"></div>
            <div class="info">
                <h2>Photobooth</h2>
                <p>Location de Bornes Interactives</p>
                <a href="mailto:contact@studio.mg?subject=Photobooth" class="btn-reserve">Réserver</a>
            </div>
        </section>
    </div>

    <div class="pagination" id="pagination">
        <div class="dot active" onclick="scrollToSlide(0)"></div>
        <div class="dot" onclick="scrollToSlide(1)"></div>
        <div class="dot" onclick="scrollToSlide(2)"></div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');

        // Détection de la slide active au scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    const index = Array.from(slides).indexOf(entry.target);
                    dots.forEach(dot => dot.classList.remove('active'));
                    dots[index].classList.add('active');
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, { threshold: 0.6 });

        slides.forEach(slide => observer.observe(slide));

        // Navigation au clic sur les boutons blancs
        function scrollToSlide(index) {
            slider.scrollTo({
                left: window.innerWidth * index,
                behavior: 'smooth'
            });
        }

        // Support molette souris
        slider.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                slider.scrollLeft += e.deltaY * 2;
            }
        });
    </script>
</body>
</html>
